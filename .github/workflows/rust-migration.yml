name: Rust migration (c2rust)

# Verifies the Rust transpile pipeline (rust-migration/) stays green: builds
# the Rust crate from the C sources and runs the project's own round-trip
# stability tests against it. See rust-migration/README.md for the full
# rationale behind each step.
on:
  push:
    branches: [master]
    paths:
      - "lib/**"
      - "src/**"
      - "dep/**"
      - "include/**"
      - "quick.make"
      - "premake5.lua"
      - "tests/**"
      - "rust-migration/**"
      - ".github/workflows/rust-migration.yml"
  pull_request:
    paths:
      - "lib/**"
      - "src/**"
      - "dep/**"
      - "include/**"
      - "quick.make"
      - "premake5.lua"
      - "tests/**"
      - "rust-migration/**"
      - ".github/workflows/rust-migration.yml"
  workflow_dispatch: {}

jobs:
  # dep/bin-linux/{premake5,ninja} are x86_64 ELF binaries (no arm64 build is
  # bundled), so the compile-database generation step runs on a standard
  # amd64 runner. The resulting compile_commands.json is portable text (paths
  # + clang flags) — transpile.sh already strips the one arch-specific flag
  # (-m64) — so it's produced here and handed to the arm64 job as an artifact.
  gen-compile-commands:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate compile_commands.json
        run: OS=linux ./rust-migration/gen-compile-commands.sh
      # c2rust chdir's into each entry's "directory" field (build/ninja) to
      # resolve the relative paths in its "command", so that directory must
      # exist verbatim in the next job too, not just compile_commands.json.
      - uses: actions/upload-artifact@v4
        with:
          name: compile_commands
          path: |
            compile_commands.json
            build/ninja/
          retention-days: 1

  # Native arm64 (GitHub-hosted, free for public repos): c2rust must run
  # native, not emulated — an amd64 image under QEMU on an arm64 host hits a
  # fatal GNU Make jobserver bug building c2rust's vendored tinycbor (see
  # rust-migration/README.md). This runner architecture exactly matches the
  # Dockerfile's target, so no adaptation is needed versus local dev.
  transpile-and-test:
    needs: gen-compile-commands
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: compile_commands

      - uses: docker/setup-buildx-action@v3

      - name: Build (or restore cached) c2rust image
        uses: docker/build-push-action@v6
        with:
          context: rust-migration
          file: rust-migration/Dockerfile
          tags: otfcc-c2rust:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Transpile
        run: |
          docker run --rm -v "$PWD":"$PWD" -w "$PWD" \
            --entrypoint bash otfcc-c2rust rust-migration/transpile.sh

      - name: Build the Rust crate and run dump/build cycles
        run: |
          docker run --rm -v "$PWD":"$PWD" -w "$PWD" \
            --entrypoint bash otfcc-c2rust rust-migration/test.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compare round-trip stability
        run: node rust-migration/compare-roundtrips.js
